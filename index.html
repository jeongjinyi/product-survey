<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>제품 선호도 조사</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}
body{background:#f5f5f3;padding:20px;min-height:100vh}
h2{font-size:20px;font-weight:500;margin-bottom:4px;color:#111}
.sub{font-size:13px;color:#888;margin-bottom:20px}

.name-section{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.name-section label{font-size:13px;color:#666;white-space:nowrap}
.name-section input{flex:1;border:none;border-bottom:1px solid #ddd;padding:4px 0;font-size:14px;color:#111;outline:none;background:transparent}
.name-section input:focus{border-bottom-color:#378ADD}

.count-bar{background:#ebebeb;border-radius:10px;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.count-bar span{font-size:13px;color:#666}
.count-bar strong{font-size:15px;font-weight:500;color:#111}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color 0.15s;position:relative}
.card:hover{border-color:#aaa}
.card.selected{border:2.5px solid #378ADD;background:#EBF4FD}
.card img{width:100%;height:140px;object-fit:cover;display:block}
.card-body{padding:9px 11px 11px}
.name{font-size:11.5px;font-weight:500;line-height:1.45;color:#222;margin-bottom:7px;min-height:32px}
.orig{font-size:10px;color:#ccc;text-decoration:line-through;margin-bottom:1px}
.price-row{display:flex;align-items:baseline;gap:4px}
.disc{font-size:11px;font-weight:600;color:#D85A30}
.final{font-size:14px;font-weight:600;color:#111}
.no-disc{font-size:14px;font-weight:600;color:#111}
.check{position:absolute;top:8px;left:8px;width:22px;height:22px;border-radius:50%;background:#378ADD;display:none;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,0.18)}
.card.selected .check{display:flex}
.check svg{width:12px;height:12px}

.submit-btn{width:100%;padding:13px;border-radius:10px;border:none;background:#378ADD;color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-bottom:14px;transition:background 0.15s}
.submit-btn:hover{background:#2a6fb5}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed}

.sending{display:none;text-align:center;padding:20px;font-size:14px;color:#666}

.result{display:none;background:#ebebeb;border-radius:12px;padding:20px}
.result-icon{font-size:32px;margin-bottom:8px}
.result h3{font-size:17px;font-weight:500;margin-bottom:4px;color:#111}
.result .result-sub{font-size:13px;color:#888;margin-bottom:16px}
.rlist{list-style:none;display:flex;flex-direction:column;gap:6px}
.rlist li{font-size:12px;color:#555;background:#fff;border-radius:8px;padding:8px 12px;border:1px solid #e5e5e5;line-height:1.5}

.setup-notice{background:#FFF8E6;border:1px solid #F5C842;border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:12.5px;line-height:1.7;color:#7A5C00}
.setup-notice strong{font-weight:600}
.setup-notice code{background:#FDEEA0;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:11.5px}
</style>
</head>
<body>

<h2>제품 선호도 조사</h2>
<p class="sub">구매하고 싶은 제품을 모두 선택해주세요 (중복 선택 가능)</p>

<div class="setup-notice" id="setup-notice">
  ⚙️ <strong>설정 필요:</strong> 아래 SCRIPT_URL을 실제 Apps Script 배포 URL로 교체해주세요.<br>
  현재는 테스트 모드로 동작합니다 (제출해도 Sheets에 저장 안 됨).
</div>

<div class="name-section">
  <label>이름</label>
  <input type="text" id="respondent-name" placeholder="이름을 입력해주세요" maxlength="20">
</div>

<div class="count-bar">
  <span>선택한 제품</span>
  <strong id="cnt">0개</strong>
</div>

<div class="grid" id="grid"></div>

<button class="submit-btn" id="sbtn" disabled onclick="submitSurvey()">제출하기</button>

<div class="sending" id="sending">제출 중...</div>

<div class="result" id="result">
  <div class="result-icon">✅</div>
  <h3>제출 완료!</h3>
  <p class="result-sub">소중한 의견 감사해요. 선택하신 제품 목록이에요.</p>
  <ul class="rlist" id="rlist"></ul>
</div>

// ✏️ 여기를 Apps Script 배포 URL로 교체하세요
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyMA6CTcX7CLg4u51BmlD0kRoQ-QOB8YUQcAqsqAUwm8Ufx3L4fdr5ULVa-Eu2SMAWB/exec';

const selected = new Set();
const fmt = n => n.toLocaleString() + '원';

function render() {
  const g = document.getElementById('grid');
  products.forEach(p => {
    const c = document.createElement('div');
    c.className = 'card';
    c.onclick = () => toggle(p.key, c);
    let price = '';
    if (p.discount && p.original) {
      price = `<div class="orig">${fmt(p.original)}</div><div class="price-row"><span class="disc">${p.discount}%</span><span class="final">${fmt(p.final)}</span></div>`;
    } else {
      price = `<div class="no-disc">${fmt(p.final)}</div>`;
    }
    c.innerHTML = `
      <div class="check"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <img src="${thumbs[p.key]}" loading="lazy" alt="${p.name}"/>
      <div class="card-body">
        <div class="name">${p.name}</div>
        ${price}
      </div>`;
    g.appendChild(c);
  });
}

function toggle(key, card) {
  if (selected.has(key)) { selected.delete(key); card.classList.remove('selected'); }
  else { selected.add(key); card.classList.add('selected'); }
  document.getElementById('cnt').textContent = selected.size + '개';
  updateSubmitBtn();
}

function updateSubmitBtn() {
  const name = document.getElementById('respondent-name').value.trim();
  document.getElementById('sbtn').disabled = selected.size === 0 || name === '';
}

document.getElementById('respondent-name').addEventListener('input', updateSubmitBtn);

async function submitSurvey() {
  const name = document.getElementById('respondent-name').value.trim();
  if (!name) { alert('이름을 입력해주세요!'); return; }
  if (selected.size === 0) { alert('제품을 1개 이상 선택해주세요!'); return; }

  const order = ["1", "2", "3", "6", "7", "8", "10", "11", "12", "17", "18", "27", "28", "29", "m1", "v1", "v2", "v3", "c1", "c2", "mg1", "s1", "s2", "s3", "bs1"];
  const selectedProducts = [...selected]
    .sort((a,b) => order.indexOf(a) - order.indexOf(b))
    .map(key => {
      const p = products.find(x => x.key === key);
      return { key: p.key, name: p.name, final: p.final };
    });

  document.getElementById('sbtn').style.display = 'none';
  document.getElementById('sending').style.display = 'block';

  const payload = { name, selected: selectedProducts };

  // URL이 설정된 경우 실제 제출
  if (SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE') {
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch(err) {
      console.error('Submit error:', err);
    }
  }

  // 결과 화면 표시
  document.getElementById('sending').style.display = 'none';
  showResult(selectedProducts, name);
}

function showResult(selectedProducts, name) {
  const list = document.getElementById('rlist');
  list.innerHTML = '';
  selectedProducts.forEach(p => {
    const li = document.createElement('li');
    li.textContent = `${p.name} — ${fmt(p.final)}`;
    list.appendChild(li);
  });
  document.getElementById('result').style.display = 'block';
}

// URL 설정 여부에 따라 안내 문구 표시
if (SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE') {
  document.getElementById('setup-notice').style.display = 'none';
}

render();
</script>
